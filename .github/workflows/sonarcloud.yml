name: SonarCloud Analysis

on:
  pull_request:
  push:
    branches:
      - main
      - release-**

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: "sonarcloud-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/ci-setup

      - name: Install cargo-llvm-cov and cargo-nextest
        run: cargo install cargo-llvm-cov --locked && cargo install cargo-nextest --locked

      - name: Run unit tests with coverage
        run: |
          mkdir -p target/sonar
          cargo llvm-cov nextest \
            --ignore-filename-regex '/test_helpers\.rs' \
            --lcov --output-path target/sonar/lcov.info

      - name: Run Clippy and generate report
        run: |
          cargo clippy --tests --no-deps --all-features --message-format=json \
            -- -Dclippy::all -Dclippy::pedantic \
            > target/sonar/clippy.json 2>/dev/null || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
