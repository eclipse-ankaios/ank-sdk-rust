sonar.projectKey=eclipse-ankaios_ank-sdk-rust
sonar.organization=eclipse-ankaios

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*test*/**,**/*tests*/**,**/test_*.rs,**/*_test.rs
sonar.exclusions=**/test_helpers.rs

sonar.rust.lcov.reportPaths=target/sonar/lcov.info
sonar.rust.clippy.enabled=false
sonar.rust.clippyReport.reportPaths=target/sonar/clippy.json

sonar.sourceEncoding=UTF-8
